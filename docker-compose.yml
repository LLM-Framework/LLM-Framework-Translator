version: '3.8'

services:
  translator:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DEBUG=true
      - CACHE_TYPE=memory
    volumes:
      - ./src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Redis for production cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    profiles:
      - with-redis

volumes:
  redis-data: